<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>טוען שיעור...</title>
    <link rel="stylesheet" href="/css/material-kit.css?v=2.0.6">
    <link rel="stylesheet" href="/css/plyr.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/latest/css/font-awesome.min.css" />
    <link href="https://fonts.googleapis.com/css?family=Heebo:400,500,700|Material+Icons" rel="stylesheet" />
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background-color: #f0f3f5;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .player-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 2rem;
            width: 100%;
            max-width: 900px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            margin-bottom: 1rem;
            color: #555;
            text-decoration: none;
        }

            .back-button i {
                margin-left: 8px;
            }

        .error-message {
            padding: 20px;
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
            border-radius: 4px;
            margin: 20px 0;
        }
    </style>
</head>
<body style="padding:0px;">

    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="player-card">
                    <a href="/offline.html" class="back-button"><i class="material-icons">arrow_forward</i> חזרה לרשימת השיעורים</a>
                    <div class="text-center">
                        <h3 class="m-0 mt-2" id="lessonTitle">טוען שיעור...</h3>
                    </div>
                    <div class="text-center my-4">
                        <ul class="nav nav-pills nav-pills-primary" style="display:inline-flex" role="tablist">
                            <li class="nav-item" id="videoTab" style="display: none;"><a id="videoB" class="nav-link" data-toggle="tab" href="#" role="tab"><i class="material-icons" style="vertical-align: middle; margin-left: 5px;">videocam</i> וידאו</a></li>
                            <li class="nav-item" id="audioTab" style="display: none;"><a id="audioB" class="nav-link" data-toggle="tab" href="#" role="tab"><i class="material-icons" style="vertical-align: middle; margin-left: 5px;">volume_up</i> שמע</a></li>
                        </ul>
                    </div>
                    <div id="media-player" class="video my-3" style="margin:-1rem;"><div id="player-wrapper"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/core/jquery.min.js"></script>
    <script src="/js/core/popper.min.js"></script>
    <script src="/js/core/bootstrap-material-design.min.js"></script>
    <script src="/js/plyr.js"></script>
    <script src="/js/hls.js"></script>
    <script src="/js/db-helper.js"></script>
    <script>
        let player;
        let currentLessonData;
        let timeUpdater;
        let offlineHls = null;
        let progressStorageKey = null;
        let legacyProgressStorageKey = null;
        const pageLoadedAt = Date.now();
        const progressSaveMinDeltaSeconds = 1;
        const progressActivityGraceMs = 30000;
        let lastPlaybackActivityAt = 0;

        function normalizePlaybackTime(value) {
            const seconds = Number(value);
            return Number.isFinite(seconds) && seconds > 0 ? seconds : 0;
        }

        function markPlaybackActivity() {
            lastPlaybackActivityAt = Date.now();
        }

        function hasRecentPlaybackActivity() {
            return lastPlaybackActivityAt > 0 && Date.now() - lastPlaybackActivityAt < progressActivityGraceMs;
        }

        function isPlayerActivelyPlaying() {
            return !!player && !player.paused && !player.ended;
        }

        function hasMeaningfulProgressChange(existing, time, isVideo) {
            if (!existing) return true;
            return existing.isVideo !== !!isVideo || Math.abs(normalizePlaybackTime(existing.time) - normalizePlaybackTime(time)) >= progressSaveMinDeltaSeconds;
        }

        function parseExplicitExpirationDate(value) {
            if (typeof value !== 'string') return null;

            const trimmed = value.trim();
            if (!trimmed || !/(?:z|[+-]\d{2}:?\d{2})$/i.test(trimmed)) {
                return null;
            }

            const parsed = Date.parse(trimmed);
            return Number.isFinite(parsed) ? parsed : null;
        }

        function resolveMembershipExpirationMs(settings) {
            const timestamp = Number(settings?.expirationUnixMs);
            if (Number.isFinite(timestamp)) {
                return timestamp;
            }

            return parseExplicitExpirationDate(settings?.expiration);
        }

        function attachProgressActivityListeners() {
            if (!player || player.__mo6ProgressActivityAttached || typeof player.on !== 'function') return;

            ['play', 'playing', 'timeupdate', 'seeked'].forEach(eventName => {
                player.on(eventName, markPlaybackActivity);
            });
            player.__mo6ProgressActivityAttached = true;
        }

        function getStoredProgress() {
            if (!progressStorageKey) return null;

            const keys = progressStorageKey === legacyProgressStorageKey
                ? [progressStorageKey]
                : [progressStorageKey, legacyProgressStorageKey].filter(Boolean);

            for (const key of keys) {
                try {
                    const raw = localStorage.getItem(key);
                    if (!raw) continue;
                    const parsed = JSON.parse(raw);
                    const time = normalizePlaybackTime(parsed?.time);
                    if (!time) continue;
                    return { time, isVideo: !!parsed.isVideo, updatedAt: parsed.updatedAt || 0 };
                } catch {
                    continue;
                }
            }

            return null;
        }

        function clearLegacyStoredProgress() {
            if (!legacyProgressStorageKey || legacyProgressStorageKey === progressStorageKey) return;

            try {
                localStorage.removeItem(legacyProgressStorageKey);
            } catch {
            }
        }

        function saveStoredProgress(time, isVideo, force = false) {
            if (!progressStorageKey) return;
            const normalizedTime = normalizePlaybackTime(time);
            if (!normalizedTime) return null;

            const existingProgress = getStoredProgress();
            if (!force && existingProgress && !hasMeaningfulProgressChange(existingProgress, normalizedTime, isVideo)) {
                return { ...existingProgress, changed: false };
            }

            const progress = {
                time: normalizedTime,
                isVideo: !!isVideo,
                updatedAt: Date.now()
            };

            try {
                localStorage.setItem(progressStorageKey, JSON.stringify(progress));
                clearLegacyStoredProgress();
            } catch (error) {
                console.warn('[OfflineTimekeeping] Local progress save failed.', error);
            }

            return { ...progress, changed: true };
        }

        function getLastKnownProgress() {
            const candidates = [];

            const indexedProgress = currentLessonData?.lastPlayed;
            const indexedTime = normalizePlaybackTime(indexedProgress?.time);
            if (indexedTime) {
                candidates.push({
                    time: indexedTime,
                    isVideo: !!indexedProgress.isVideo,
                    updatedAt: indexedProgress.updatedAt || 0
                });
            }

            const storedProgress = getStoredProgress();
            if (storedProgress) {
                candidates.push(storedProgress);
            }

            candidates.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
            return candidates[0] || null;
        }

        document.addEventListener('DOMContentLoaded', async function () {
            const urlParams = new URLSearchParams(window.location.search);
            const contentName = urlParams.get('contentName');

            if (!contentName) {
                // Use the new showError to replace the entire player container.
                return showError('שגיאה: לא זוהה שיעור בכתובת.');
            }

            const offlineMediaMessagePayload = { contentName };
            function postOfflineMediaState(type) {
                try {
                    navigator.serviceWorker?.controller?.postMessage({
                        type,
                        payload: offlineMediaMessagePayload
                    });
                } catch (error) {
                    console.warn('[OfflineMedia] Failed to update service worker media state.', error);
                }
            }

            postOfflineMediaState('ENABLE_OFFLINE_MEDIA');
            window.addEventListener('pageshow', () => {
                postOfflineMediaState('ENABLE_OFFLINE_MEDIA');
            });
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    postOfflineMediaState('ENABLE_OFFLINE_MEDIA');
                });
            }
            window.addEventListener('pagehide', () => {
                postOfflineMediaState('DISABLE_OFFLINE_MEDIA');
            });

            try {
                // 1. Fetch both the lesson data and the user settings in parallel.
                const [lessonData, settings] = await Promise.all([
                    offlineContentDB.getLesson(contentName),
                    offlineContentDB.getMembershipStatus()
                ]);

                currentLessonData = lessonData;
                const progressOwner = settings?.memberId
                    ? `member:${settings.memberId}`
                    : 'anonymous';
                legacyProgressStorageKey = `lesson-progress:${contentName}`;
                progressStorageKey = `lesson-progress:${progressOwner}:${contentName}`;

                if (!currentLessonData) {
                    return showError('שגיאה: לא נמצאו נתונים עבור שיעור זה במכשיר.');
                }

                // Set the page title and lesson title immediately.
                document.title = currentLessonData.title;
                document.getElementById('lessonTitle').textContent = currentLessonData.title;

                // 2. Perform the critical access check.
                const expirationMs = resolveMembershipExpirationMs(settings);
                const isMembershipExpired = !Number.isFinite(expirationMs) || Date.now() > expirationMs;

                if (currentLessonData.requiresMembership && isMembershipExpired) {
                    const expirationLabel = Number.isFinite(expirationMs) ? new Date(expirationMs).toISOString() : 'invalid';
                    console.log(`[Access Denied] Lesson requires membership, but offline membership is expired or invalid (Expiration: ${expirationLabel}).`);
                    // Show a specific, clear error message for expired membership.
                    return showError('המנוי שלך פג תוקף ולכן שיעור זה אינו זמין. יש להתחבר לאינטרנט ולחדש את המנוי כדי לקבל גישה.');
                }

                // 3. If the check passes, proceed with loading the player.
                console.log('[Access Granted] User has permission to view this offline lesson.');
                setupTabsAndPlayer();

            } catch (error) {
                console.error("Error loading lesson:", error);
                showError('שגיאה קריטית בטעינת השיעור.');
            }
        });

        function setupTabsAndPlayer() {
            const videoAvailable = currentLessonData.videoStatus === 'completed';
            const audioAvailable = currentLessonData.audioStatus === 'completed';

            if (!videoAvailable && !audioAvailable) {
                return showError('הקבצים עבור שיעור זה לא הורדו למכשיר במלואם.');
            }

            if (videoAvailable) $('#videoTab').show();
            if (audioAvailable) $('#audioTab').show();

            const progress = getLastKnownProgress();
            const lastPlayedIsVideo = progress?.isVideo ?? true;
            let initialPlayerIsVideo = (lastPlayedIsVideo && videoAvailable) || (!audioAvailable);

            if (initialPlayerIsVideo) {
                $('#videoB').addClass('active');
                initOfflineVideoPlayer();
            } else {
                $('#audioB').addClass('active');
                initOfflineAudioPlayer();
            }

            $('#videoB').on('click', function (e) {
                e.preventDefault();
                if ($(this).hasClass('active')) return;
                saveCurrentTimestamp(true);
                $('#audioB').removeClass('active');
                $(this).addClass('active');
                clearPlayer();
                initOfflineVideoPlayer();
            });

            $('#audioB').on('click', function (e) {
                e.preventDefault();
                if ($(this).hasClass('active')) return;
                saveCurrentTimestamp(true);
                $('#videoB').removeClass('active');
                $(this).addClass('active');
                clearPlayer();
                initOfflineAudioPlayer();
            });
        }

        function showError(message) {
            // This function now replaces the *entire* player container,
            // including tabs, with the error message for a cleaner result.
            const playerContainer = document.querySelector('.player-card');
            if (playerContainer) {
                playerContainer.innerHTML = `
                        <a href="/offline.html" class="back-button"><i class="material-icons">arrow_forward</i> חזרה לרשימת השיעורים</a>
                        <h3 class="m-0 mt-2 text-center" id="lessonTitle">${currentLessonData ? currentLessonData.title : 'שגיאה'}</h3>
                        <div class="error-message text-center" style="margin-top: 2rem;">${message}</div>
                     `;
            }
        }

        // --- All other functions (clearPlayer, initOfflineVideoPlayer, initOfflineAudioPlayer, seek logic, etc.)
        // remain the same as your original, no changes needed below this line. ---

        let audioRecoveryCleanup = null;

        function attachAudioRecovery(audioElement, getSourceUrl) {
            if (!audioElement) return null;

            let waitingTimer = null;
            let watchdogTimer = null;
            let lastTime = audioElement.currentTime || 0;
            let stagnantChecks = 0;
            let recovering = false;
            let retries = 0;
            let retryWindowStartedAt = Date.now();

            const clearWaitingTimer = () => {
                if (waitingTimer) {
                    clearTimeout(waitingTimer);
                    waitingTimer = null;
                }
            };

            const resetProgressState = () => {
                clearWaitingTimer();
                stagnantChecks = 0;
                lastTime = audioElement.currentTime || 0;
            };

            const attemptRecovery = reason => {
                if (recovering || audioElement.ended) return;

                const now = Date.now();
                if (now - retryWindowStartedAt > 30000) {
                    retries = 0;
                    retryWindowStartedAt = now;
                }

                if (retries >= 3) {
                    console.warn(`[OfflineAudio] Recovery limit reached. reason=${reason}`);
                    return;
                }

                const sourceUrl = (getSourceUrl && getSourceUrl()) || audioElement.currentSrc || audioElement.src;
                if (!sourceUrl) return;

                recovering = true;
                retries += 1;
                clearWaitingTimer();

                const currentTime = normalizePlaybackTime(audioElement.currentTime);
                const resumeTime = normalizePlaybackTime(lastTime) > currentTime + 1 ? normalizePlaybackTime(lastTime) : currentTime;
                const shouldResume = !audioElement.paused && !audioElement.ended;
                let restored = false;
                let recoveryTimeout = null;

                const cleanupRecoveryListeners = () => {
                    if (recoveryTimeout) clearTimeout(recoveryTimeout);
                    audioElement.removeEventListener('loadedmetadata', finishRecovery);
                    audioElement.removeEventListener('canplay', finishRecovery);
                    audioElement.removeEventListener('error', failRecovery);
                };

                const finishRecovery = async () => {
                    if (restored) return;
                    restored = true;
                    cleanupRecoveryListeners();

                    try {
                        if (resumeTime > 0) {
                            audioElement.currentTime = resumeTime;
                        }
                    } catch (error) {
                        console.warn('[OfflineAudio] Recovery seek failed.', error);
                    }

                    if (shouldResume) {
                        try {
                            await audioElement.play();
                        } catch (playError) {
                            console.warn('[OfflineAudio] Recovery play() failed.', playError);
                        }
                    }

                    resetProgressState();
                    recovering = false;
                };

                const failRecovery = () => {
                    cleanupRecoveryListeners();
                    recovering = false;
                };

                console.warn(`[OfflineAudio] Attempting recovery. reason=${reason}, retry=${retries}, time=${resumeTime}`);

                try {
                    audioElement.addEventListener('loadedmetadata', finishRecovery, { once: true });
                    audioElement.addEventListener('canplay', finishRecovery, { once: true });
                    audioElement.addEventListener('error', failRecovery, { once: true });

                    audioElement.pause();
                    const sourceNode = audioElement.querySelector('source');
                    if (sourceNode) {
                        sourceNode.src = sourceUrl;
                    }
                    audioElement.src = sourceUrl;
                    audioElement.load();
                    recoveryTimeout = setTimeout(finishRecovery, 5000);
                } catch (error) {
                    console.error('[OfflineAudio] Recovery failed.', error);
                    failRecovery();
                }
            };

            const scheduleRecovery = (reason, delayMs = 4000) => {
                clearWaitingTimer();
                waitingTimer = setTimeout(() => {
                    if (!audioElement.paused && !audioElement.ended && audioElement.readyState < 3) {
                        attemptRecovery(reason);
                    }
                }, delayMs);
            };

            const handleWaiting = () => scheduleRecovery('waiting-timeout');
            const handleStalled = () => scheduleRecovery('stalled-event');
            const handleError = () => attemptRecovery('error-event');
            const handleTimeUpdate = () => {
                markPlaybackActivity();
                lastTime = audioElement.currentTime || 0;
                stagnantChecks = 0;
                clearWaitingTimer();
            };

            const handleWatchdog = () => {
                if (audioElement.paused || audioElement.ended || recovering || audioElement.seeking || audioElement.readyState < 2) {
                    stagnantChecks = 0;
                    lastTime = audioElement.currentTime || 0;
                    return;
                }

                const currentTime = audioElement.currentTime || 0;
                if (Math.abs(currentTime - lastTime) < 0.05) {
                    stagnantChecks += 1;
                    if (stagnantChecks >= 3) {
                        attemptRecovery('watchdog-stalled');
                    }
                } else {
                    stagnantChecks = 0;
                    lastTime = currentTime;
                }
            };

            audioElement.addEventListener('waiting', handleWaiting);
            audioElement.addEventListener('stalled', handleStalled);
            audioElement.addEventListener('error', handleError);
            audioElement.addEventListener('canplay', resetProgressState);
            audioElement.addEventListener('playing', resetProgressState);
            audioElement.addEventListener('seeked', resetProgressState);
            audioElement.addEventListener('timeupdate', handleTimeUpdate);

            watchdogTimer = setInterval(handleWatchdog, 3000);
            resetProgressState();

            return () => {
                clearWaitingTimer();
                if (watchdogTimer) clearInterval(watchdogTimer);
                audioElement.removeEventListener('waiting', handleWaiting);
                audioElement.removeEventListener('stalled', handleStalled);
                audioElement.removeEventListener('error', handleError);
                audioElement.removeEventListener('canplay', resetProgressState);
                audioElement.removeEventListener('playing', resetProgressState);
                audioElement.removeEventListener('seeked', resetProgressState);
                audioElement.removeEventListener('timeupdate', handleTimeUpdate);
            };
        }

        function clearPlayer() {
            if (audioRecoveryCleanup) { audioRecoveryCleanup(); audioRecoveryCleanup = null; }
            if (player) { player.destroy(); player = null; }
            if (offlineHls) { offlineHls.destroy(); offlineHls = null; }
            if (timeUpdater) { clearInterval(timeUpdater); timeUpdater = null; }
            $('#player-wrapper').empty();
        }

        function initOfflineVideoPlayer() {
            const playerWrapper = document.getElementById('player-wrapper');
            const qualityPlaylistUrl = currentLessonData.hlsQualityPlaylistUrl;
            if (!qualityPlaylistUrl) { return showError('שגיאה: כתובת הוידאו לא נשמרה כראוי.'); }
            const playlistUrlWithoutSAS = qualityPlaylistUrl.split('?')[0];
            playerWrapper.innerHTML = `<video poster="${currentLessonData.imageUrl || ''}" id="player" playsinline preload="metadata" controls></video>`;
            const video = document.querySelector('#player');
            player = new Plyr(video, { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'pip', 'fullscreen', 'settings'], settings: ['speed'], keyboard: { focused: true, global: true } });
            const canUseNativeHls = video.canPlayType('application/vnd.apple.mpegurl') || video.canPlayType('application/x-mpegURL');

            if (canUseNativeHls) {
                video.src = playlistUrlWithoutSAS;
                video.addEventListener('error', () => showError('שגיאה בטעינת הוידאו.'), { once: true });
            } else if (window.Hls && Hls.isSupported()) {
                offlineHls = new Hls({ debug: false });
                offlineHls.on(Hls.Events.ERROR, (event, data) => {
                    if (!data?.fatal) return;

                    console.warn('[OfflineHLS] Fatal playback error.', data);
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                        offlineHls.startLoad();
                    } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        offlineHls.recoverMediaError();
                    } else {
                        showError('שגיאה בטעינת הוידאו.');
                    }
                });
                offlineHls.on(Hls.Events.MEDIA_ATTACHED, () => offlineHls.loadSource(playlistUrlWithoutSAS));
                offlineHls.attachMedia(video);
            } else {
                return showError('הדפדפן אינו תומך בניגון הוידאו.');
            }

            player.once('ready', () => seekToLastKnownTime());
            startSavingTimestamp();
        }

        function initOfflineAudioPlayer() {
            const playerWrapper = document.getElementById('player-wrapper');
            const audioUrl = currentLessonData.audioUrl;
            if (!audioUrl) { return showError('שגיאה: כתובת השמע לא נשמרה כראוי.'); }
            const audioUrlWithoutSAS = audioUrl.split('?')[0];
            playerWrapper.innerHTML = `<audio id="playerA" preload="metadata" controls><source src="${audioUrlWithoutSAS}" type="audio/mpeg"></audio>`;
            const audioElement = document.querySelector('#playerA');
            player = new Plyr(audioElement, { controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'settings'], keyboard: { focused: true, global: true } });
            audioRecoveryCleanup = attachAudioRecovery(audioElement, () => audioUrlWithoutSAS);
            player.once('ready', () => seekToLastKnownTime());
            startSavingTimestamp();
        }

        function seekPlayerTo(time) {
            const seconds = normalizePlaybackTime(time);
            if (!player || !seconds) return;

            const media = player.media || document.querySelector('#player, #playerA');
            const applySeek = () => {
                try {
                    player.currentTime = seconds;
                } catch (error) {
                    console.warn('[OfflineTimekeeping] Seek failed.', error);
                }
            };

            if (media && media.readyState >= 1) {
                applySeek();
            } else if (media) {
                media.addEventListener('loadedmetadata', applySeek, { once: true });
                media.addEventListener('canplay', applySeek, { once: true });
            } else {
                player.once('ready', applySeek);
            }
        }

        function seekToLastKnownTime() {
            const progress = getLastKnownProgress();
            if (player && progress?.time) {
                seekPlayerTo(progress.time);
            }
        }

        function saveCurrentTimestamp(force = false) {
            if (!player || !currentLessonData) return;
            const time = normalizePlaybackTime(player.currentTime);
            if (!time) return;

            const isVideo = $('#videoB').hasClass('active');
            const latestBeforeSave = getLastKnownProgress();
            const latestIsNewerThanThisPage = (latestBeforeSave?.updatedAt || 0) > pageLoadedAt + 1000;
            const activeOrRecent = isPlayerActivelyPlaying() || hasRecentPlaybackActivity();
            const materialChange = hasMeaningfulProgressChange(latestBeforeSave, time, isVideo);

            if (!force) {
                if (latestIsNewerThanThisPage && !activeOrRecent) return;
                if (!activeOrRecent && !materialChange) return;
            }

            const progress = saveStoredProgress(time, isVideo, force);
            if (!progress || !progress.changed) return;

            currentLessonData.lastPlayed = progress;
            offlineContentDB.saveTimestamp(currentLessonData.contentName, time, isVideo)
                .catch(error => console.warn('[OfflineTimekeeping] IndexedDB progress save failed.', error));
        }

        function startSavingTimestamp() {
            if (timeUpdater) clearInterval(timeUpdater);
            attachProgressActivityListeners();
            timeUpdater = setInterval(() => {
                saveCurrentTimestamp();
            }, 5000);
        }

        function flushOfflineProgress(stopUpdater = true) {
            if (stopUpdater && timeUpdater) { clearInterval(timeUpdater); timeUpdater = null; }
            saveCurrentTimestamp();
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                flushOfflineProgress(false);
            } else if (!timeUpdater && player) {
                startSavingTimestamp();
            }
        });
        window.addEventListener('pagehide', () => flushOfflineProgress(true));
        window.addEventListener('beforeunload', () => flushOfflineProgress(true));
    </script>
</body>
</html>
